name: security-center-ci

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/src/views/security/**'
      - 'frontend/src/views/ids/**'
      - 'frontend/src/styles/security-hud-shared.scss'
      - 'backend/app/api/ids.py'
      - 'backend/app/middleware/ids_middleware.py'
      - 'backend/app/models/ids_event.py'
      - 'backend/app/services/ids_engine.py'
      - 'backend/app/services/ids_ai_analysis.py'
      - '.github/CODEOWNERS'
      - '.github/workflows/security-center-ci.yml'
  push:
    branches: [ 'security-center/**' ]

jobs:
  frontend-security-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-security-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -c "from app.main import app; print('backend import ok')"
